name: Build ISO images

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-iso:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: qemu
            flakeAttr: nixosConfigurations.liveiso
          - name: vmware
            flakeAttr: nixosConfigurations.liveisoVmware

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Nix
        uses: nix-community/setup-nix@v4
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Build ISO
        run: nix build .#${{ matrix.flakeAttr }}.config.system.build.isoImage -L

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: lucas-nixos-${{ matrix.name }}.iso
          path: result
